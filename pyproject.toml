[project]
name = "emospeech"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "gdown~=4.7.1",
    "librosa~=0.9.2",
    "lightning~=2.0.3",
    "loguru~=0.6.0",
    "matplotlib~=3.6.3",
    "numpy==1.23.5",
    "opensmile~=2.4.2",
    "pandas~=1.5.1",
    "pillow~=9.5.0",
    "pip-system-certs>=4.0",
    "pyrallis~=0.3.1",
    "pyworld>=0.3.0",
    "pyyaml~=6.0",
    "scikit-learn~=1.1.2",
    "scipy~=1.9.3",
    "seaborn~=0.12.2",
    "soundfile~=0.12.1",
    "tgt~=1.4.4",
    "torch>=2.8.0",
    "torchaudio>=2.11.0",
    "torchcodec>=0.9.1",
    "torchmetrics~=0.11.4",
    "torchvision>=0.23.0",
    "tqdm~=4.64.1",
    "wandb>=0.16",
]

[tool.uv.sources]
torch = [
    { index = "pytorch-cpu" },
]
torchaudio = [
    { index = "pytorch-cpu" },
]
torchvision = [
    { index = "pytorch-cpu" },
]
torchcodec = [
    { index = "pytorch-cpu" },
]


[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true


[tool.uv.extra-build-dependencies]
      pathtools = ["imp"]
